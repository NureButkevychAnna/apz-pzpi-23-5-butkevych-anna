# Specify desired backend replica counts for the benchmark (comma-separated)
x-backend-replicas: "1,3,5"

services:
  postgres:
    image: postgres:15
    container_name: pgdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:1234@postgres:5432/mydb
      JWT_SECRET: ${JWT_SECRET:-change_me}
      API_URL: ${API_URL:-http://localhost:3001/api}
    expose:
      - "3000"
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3001:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  iot-simulator:
    build: ./iot_client_python
    container_name: iot_simulator
    environment:
      API_URL: http://backend:3000/api/readings
      DEVICE_TOKEN: ${DEVICE_TOKEN:-demo-token-12345}
      INTERVAL: ${IOT_INTERVAL:-5}
      MAX_RETRIES: ${IOT_MAX_RETRIES:-5}
      BUFFER_FILE: buffer.json
    depends_on:
      - backend
    restart: unless-stopped

  locust:
    image: locustio/locust:2.31.6
    working_dir: /mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://nginx
    volumes:
      - ./loadtest:/mnt/locust
    ports:
      - "8089:8089"
    depends_on:
      - nginx

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
